<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="base(pageTitle, pageContent)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">TaskFlow</title>
    <link rel="icon" type="image/png" sizes="512x512" href="https://cdn-icons-png.flaticon.com/512/7137/7137591.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/7137/7137591.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css(v=3)}" rel="stylesheet">
</head>
<body class="bg-body-tertiary">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <th:block th:replace="${pageContent}"></th:block>
</main>

<div class="modal fade" id="taskDetailsModal" tabindex="-1" aria-labelledby="taskDetailsModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="taskDetailsModalLabel">Edit task</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="d-flex align-items-center justify-content-between mb-3">
                    <span id="taskDetailsStatus" class="badge"></span>
                    <small class="text-body-secondary">Completed at: <span id="taskDetailsCompletedAt">-</span></small>
                </div>

                <form id="taskQuickEditForm" method="post" class="row g-3 mb-3">
                    <input type="hidden" name="boardCategoryId" id="taskQuickEditBoardCategoryId">

                    <div class="col-md-6">
                        <label class="form-label" for="taskDetailsTitle">Title *</label>
                        <input id="taskDetailsTitle" class="form-control" name="title" type="text" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label" for="taskDetailsStatusSelect">Status</label>
                        <select id="taskDetailsStatusSelect" class="form-select" name="status">
                            <option th:each="status : ${statuses}" th:value="${status}" th:text="${status.displayName}"></option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label" for="taskDetailsDeadlineInput">Deadline</label>
                        <input id="taskDetailsDeadlineInput" class="form-control" name="deadline" type="date">
                    </div>

                    <div class="col-12">
                        <label class="form-label" for="taskDetailsCategorySelect">Category</label>
                        <select id="taskDetailsCategorySelect" class="form-select" name="categoryId">
                            <option value="">No category</option>
                            <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
                        </select>
                    </div>

                    <div class="col-12">
                        <label class="form-label" for="taskDetailsDescription">Description</label>
                        <textarea id="taskDetailsDescription" class="form-control" name="description" rows="5" placeholder="Describe this task"></textarea>
                    </div>

                    <div class="col-12 d-flex justify-content-end">
                        <button type="submit" class="btn btn-primary">Save changes</button>
                    </div>
                </form>

                <hr class="my-4">

                <div>
                    <h2 class="h6 mb-3">Updates</h2>
                    <form id="taskUpdateForm" method="post" class="d-flex gap-2 mb-3">
                        <input type="hidden" name="boardCategoryId" id="taskUpdateBoardCategoryId">
                        <label class="visually-hidden" for="taskUpdateComment">Update comment</label>
                        <input id="taskUpdateComment" class="form-control" type="text" name="comment" maxlength="2000" placeholder="Write an update..." required>
                        <button class="btn btn-outline-primary" type="submit">Add</button>
                    </form>
                    <div id="taskUpdatesList" class="list-group small"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script th:src="@{/js/kanban.js(v=3)}"></script>
</body>
</html>
