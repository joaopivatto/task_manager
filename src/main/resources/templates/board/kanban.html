<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: base('Kanban Board', ~{::content})}">
<th:block th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Kanban Board</h1>
        <a class="btn btn-primary" th:href="@{/tasks/new}"><i class="bi bi-plus-lg"></i> New Task</a>
    </div>

    <form class="row g-2 mb-3" method="get" th:action="@{/board}">
        <div class="col-12 col-md-5 col-lg-4">
            <select class="form-select" name="categoryId">
                <option value="">All categories</option>
                <option th:each="category : ${categories}"
                        th:value="${category.id}"
                        th:text="${category.name}"
                        th:selected="${selectedCategoryId != null and selectedCategoryId == category.id}"></option>
            </select>
        </div>
        <div class="col-auto">
            <button class="btn btn-outline-primary" type="submit">Filter</button>
        </div>
        <div class="col-auto" th:if="${selectedCategoryId != null}">
            <a class="btn btn-outline-secondary" th:href="@{/board}">Clear</a>
        </div>
    </form>

    <div class="row g-3">
        <div class="col-12 col-md-6 col-xl-3" th:each="status : ${statuses}">
            <section class="kanban-column card shadow-sm h-100">
                <div class="card-header d-flex justify-content-between align-items-center" th:classappend="${status.columnClass}">
                    <span class="fw-semibold" th:text="${status.displayName}">TO DO</span>
                    <span class="badge" th:classappend="${status.badgeClass}" th:text="${#lists.size(board.get(status))}">0</span>
                </div>
                <div class="card-body kanban-list" th:attr="data-status=${status}">
                    <div th:if="${#lists.isEmpty(board.get(status))}" class="small text-body-secondary">No tasks in this column</div>
                    <th:block th:each="task : ${board.get(status)}">
                        <div th:replace="~{fragments/task-card :: taskCard(${task}, ${selectedCategoryId})}"></div>
                    </th:block>
                </div>
            </section>
        </div>
    </div>

    <div class="mt-4">
        <h2 class="h5">Quick status update (fallback)</h2>
        <p class="text-body-secondary small mb-3">Drag-and-drop now persists status automatically. Use this section as a fallback when needed.</p>
        <div class="table-responsive">
            <table class="table table-sm align-middle">
                <thead>
                <tr>
                    <th>Task</th>
                    <th>Current</th>
                    <th>Move to</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(tasks)}">
                    <td colspan="3" class="text-center text-body-secondary py-3">No active tasks</td>
                </tr>
                <tr th:each="task : ${tasks}">
                    <td th:text="${task.title}">Task</td>
                    <td><span class="badge" th:classappend="${task.status.badgeClass}" th:text="${task.status.displayName}"></span></td>
                    <td>
                        <form class="d-flex gap-2" method="post" th:action="@{/tasks/{id}/status(id=${task.id})}">
                            <input type="hidden" name="categoryId" th:if="${selectedCategoryId != null}" th:value="${selectedCategoryId}">
                            <select class="form-select form-select-sm" name="status">
                                <option th:each="target : ${statuses}" th:value="${target}" th:text="${target.displayName}" th:selected="${target == task.status}"></option>
                            </select>
                            <button class="btn btn-sm btn-outline-primary" type="submit">Apply</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</th:block>
</html>
